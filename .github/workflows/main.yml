# -------------------------------------------------------------------------------------
# NOTE FOR MAINTAINERS:
#
# This workflow uses pre-built Skia binaries where available (FORCE_SKIA_BINARIES_DOWNLOAD=1).
# When pre-built binaries are unavailable for a target, Skia compiles from source.
#
# Do NOT add gn, ninja, or depot_tools — Skia's GN build system is embedded in skia-bindings.
#
# macOS Intel (x86_64-apple-darwin) cross-compile from ARM64 runner (macos-14):
# - Xcode's bundled clang on ARM64 blocks x86 SIMD headers with a compile error.
# - We install Homebrew LLVM and prepend it to PATH so Skia's GN finds a proper
#   multi-target clang with x86 intrinsic headers.
# - Do NOT set CC/CXX env vars — Skia's GN configures its own compiler separately.
#
# macOS ARM64 (aarch64-apple-darwin) native build:
# - CFLAGS=-DZLIB_DISABLE_CHUNK_SIMD disables x86-only zlib SIMD paths for skia-safe
#   (reaches skia-safe via cc crate / CFLAGS passthrough, but NOT Skia's ninja).
#
# To upgrade Skia, ONLY update SKIA_BINARIES_URL and SKIA_BINARIES_KEY.
# -------------------------------------------------------------------------------------

name: Build and Release VST3/CLAP

on:
  push:
    branches:
      - main              # Build only (no release)
      - 'release/**'      # Build and release
      - 'feature/**'      # Build and release for testing
    tags:
      - 'v*'             # Build and release on version tags

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: linux
            features: api5500,buttercomp2,pultec,transformer,punch,dynamic_eq,gui
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows
            features: api5500,buttercomp2,pultec,transformer,punch,dynamic_eq,gui
          - target: x86_64-apple-darwin
            os: macos-14  # ARM64 runner; cross-compiles x86_64 via rustup target
            name: macos-intel
            # No GUI: Skia's GN/ninja uses xcrun clang (not PATH), so Homebrew LLVM
            # cannot override it. Cross-compiling Skia's x86 SIMD code from ARM64
            # host fails with hard #error in Xcode's mmintrin.h/emmintrin.h headers.
            # ARM64 build includes full GUI. Intel users can build with GUI from source.
            features: api5500,buttercomp2,pultec,transformer,punch,dynamic_eq
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-arm64
            features: api5500,buttercomp2,pultec,transformer,punch,dynamic_eq,gui

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install rustfmt component (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup component add rustfmt

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          clang \
          libasound2-dev \
          libfreetype6-dev \
          libfontconfig-dev \
          libglu1-mesa-dev \
          libegl1-mesa-dev \
          libwayland-egl1-mesa \
          libwayland-dev \
          mesa-common-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcursor-dev \
          libxi-dev \
          libxinerama-dev \
          libxrandr-dev \
          libxss-dev \
          pkg-config \
          build-essential


      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        run: |
          # Configure Rust for MSVC target (matches local script)
          rustup target add x86_64-pc-windows-msvc

      - name: Install zip (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install -y zip

      - name: Set environment for pre-built Skia binaries
        shell: bash
        run: |
          # Force binary downloads using rust-skia's actual environment variables
          echo "FORCE_SKIA_BINARIES_DOWNLOAD=1" >> $GITHUB_ENV
          echo "RUST_BACKTRACE=1" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=true" >> $GITHUB_ENV
          
          # Optionally point rust-skia at your own prebuilt tarball and key using repository Variables (Actions -> Variables)
          # - SKIA_BINARIES_URL: Full URL to the prebuilt tarball (or leave unset to use rust-skia defaults)
          # - SKIA_BINARIES_KEY: Optional override for the binary key (platform/features selector)
          if [[ -n "${{ vars.SKIA_BINARIES_URL }}" ]]; then
            echo "SKIA_BINARIES_URL=${{ vars.SKIA_BINARIES_URL }}" >> $GITHUB_ENV
          fi
          if [[ -n "${{ vars.SKIA_BINARIES_KEY }}" ]]; then
            echo "SKIA_BINARIES_KEY=${{ vars.SKIA_BINARIES_KEY }}" >> $GITHUB_ENV
          fi

          # On Linux, avoid requiring EGL headers if a source build is triggered
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "SKIA_GN_ARGS=skia_use_egl=false" >> $GITHUB_ENV
          fi

          # aarch64 native build: Skia's zlib adler32_simd.c tries to include x86
          # SIMD headers that don't exist on ARM. ZLIB_DISABLE_CHUNK_SIMD skips them.
          # NOTE: this env var only reaches skia-safe via cc crate / CFLAGS passthrough.
          # For x86_64 cross-compile from ARM, we use Homebrew LLVM instead (see below).
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            echo "CFLAGS=-DZLIB_DISABLE_CHUNK_SIMD" >> $GITHUB_ENV
            echo "CXXFLAGS=-DZLIB_DISABLE_CHUNK_SIMD" >> $GITHUB_ENV
          fi
          # Do NOT set DOCS_RS in CI. That variable is meant for docs.rs
          # and forces skia-bindings into a special docs build path that
          # fails outside docs.rs with missing files.

      - name: Prepare Skia offline tarball (optional)
        if: ${{ vars.SKIA_BINARIES_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          url="${{ vars.SKIA_BINARIES_URL }}"
          # If the provided URL is http(s), download it locally and point SKIA_BINARIES_URL to a file:// path
          if [[ "$url" =~ ^https?:// ]]; then
            out="$RUNNER_TEMP/skia-prebuilt.tar.gz"
            curl -fsSL "$url" -o "$out"
            echo "SKIA_BINARIES_URL=file://$out" >> "$GITHUB_ENV"
          fi
          # If SKIA_BINARIES_URL was already a file:// or absolute path, the previous step has exported it unchanged.

      - name: Clean previous build artifacts
        run: cargo clean

      - name: Build xtask
        run: |
          cargo +nightly build --package xtask

      - name: Build and bundle plugins
        run: |
          cargo +nightly run --package xtask -- bundle bus_channel_strip --release --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Create archive name
        id: archive
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "name=Bus-Channel-Strip-${{ matrix.name }}.zip" >> $GITHUB_OUTPUT
          else
            echo "name=Bus-Channel-Strip-${{ matrix.name }}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Create archive
        shell: bash
        run: |
          cd target/bundled
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            zip -r Bus-Channel-Strip-${{ matrix.name }}.zip Bus-Channel-Strip.vst3 Bus-Channel-Strip.clap
          else
            tar -czf Bus-Channel-Strip-${{ matrix.name }}.tar.gz Bus-Channel-Strip.vst3 Bus-Channel-Strip.clap
          fi
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: target/bundled/${{ steps.archive.outputs.name }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    # Only create releases for release/feature branches and version tags, NOT main
    if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and branch info
        id: get_version
        run: |
          VERSION=$(grep -m 1 'version' Cargo.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Determine if this is a prerelease based on branch
          if [[ "$GITHUB_REF" == refs/heads/feature/* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "BRANCH_SUFFIX=-$(echo $GITHUB_REF | sed 's|refs/heads/feature/||')" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "BRANCH_SUFFIX=" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "BRANCH_SUFFIX=" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "BRANCH_SUFFIX=-dev" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la artifacts/
          find artifacts/ -type f

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}${{ steps.get_version.outputs.BRANCH_SUFFIX }}
          release_name: Bus Channel Strip v${{ steps.get_version.outputs.VERSION }}${{ steps.get_version.outputs.BRANCH_SUFFIX }}
          draft: false
          prerelease: ${{ steps.get_version.outputs.PRERELEASE }}

      - name: Upload Linux release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Bus-Channel-Strip-linux.tar.gz/Bus-Channel-Strip-linux.tar.gz
          asset_name: Bus-Channel-Strip-linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Bus-Channel-Strip-windows.zip/Bus-Channel-Strip-windows.zip
          asset_name: Bus-Channel-Strip-windows.zip
          asset_content_type: application/zip

      - name: Upload macOS Intel release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Bus-Channel-Strip-macos-intel.tar.gz/Bus-Channel-Strip-macos-intel.tar.gz
          asset_name: Bus-Channel-Strip-macos-intel.tar.gz
          asset_content_type: application/gzip

      - name: Upload macOS ARM64 release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Bus-Channel-Strip-macos-arm64.tar.gz/Bus-Channel-Strip-macos-arm64.tar.gz
          asset_name: Bus-Channel-Strip-macos-arm64.tar.gz
          asset_content_type: application/gzip
