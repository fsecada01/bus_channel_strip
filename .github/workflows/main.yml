name: Create VST3/CLAP Release

on:
  push:
    branches:
      - main
      - 'v[0-9]+*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev libxinerama-dev libxss-dev libglu1-mesa-dev freeglut3-dev mesa-common-dev build-essential gcc g++ libx11-xcb-dev libxcb1-dev

      - name: Build and bundle plugins
        run: |
          cargo xtask bundle bus_channel_strip --release

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get version
        id: get_version
        run: echo "::set-output name=VERSION::$(grep -m 1 'version' Cargo.toml | cut -d '"' -f 2)"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: ${{ github.ref != 'refs/heads/main' }}
          prerelease: ${{ github.ref != 'refs/heads/main' }}

      - name: Install Rust (for bundling)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install system dependencies (for bundling)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev libxinerama-dev libxss-dev libglu1-mesa-dev freeglut3-dev mesa-common-dev build-essential gcc g++ libx11-xcb-dev libxcb1-dev

      - name: Build and bundle plugins (for release)
        run: |
          echo "=== Attempting to bundle with cargo xtask ==="
          cargo xtask bundle bus_channel_strip --release || echo "Bundle command failed"
          echo ""
          echo "=== Trying alternative bundle command ==="
          cargo xtask bundle --release || echo "Alternative bundle command failed"
          echo ""
          echo "=== Building library first ==="
          cargo build --release

      - name: List all target contents (debug)
        run: |
          echo "=== Full target directory structure ==="
          ls -la target/ || echo "No target directory"
          echo ""
          echo "=== Searching for plugin files ==="
          find . -name "*.vst3" -o -name "*.clap" -o -name "*bus_channel_strip*" | head -30
          echo ""
          echo "=== All files in target (recursive) ==="
          find target -type f | head -30 || echo "No files in target"

